<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title> Precision 3D | Model Analyzer - STL Viewer</title>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script
src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/STLLoader.js">
</script>   
    <script
src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js">
</script>         

    <style>
        :root {
          --bg-app: #e0e7ff;
          --bg-sidebar: #ffffff;
          --bg-viewport: #f8fafc;
          --bg-card: #1a1c2c;
          --text-main: #8b5cf6;
          --accent-primary: #1a1c2c; 
          --border-width: 3px;
          --hard-shadow: 6px 6px 0px #1a1c2c;
          --hard-shadow: 3px 3px 0px #1a1c2c;

        }
        [data-theme="dark"] {
            --bg-app: #0f111a;
            --bg-sidebar: #1a1c2c;
            --bg-viewport: #000000;
            --bg-card: #24283b;
            --text-main: #ffffff;
            --accent-primary: #a78bfa; 
            --border-color: #ffffff;
            --border-width: 6px 6px 0px #4f6e54;
            --hard-shadow-small: 3px 3px 0px #4f46e5;
            
        }
        * {
            box-sizing: border-box;
            transition: transform 0.1s, background-color 0.3s, color 0.3s,
                border-color 0.3s;
        }
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Courier New", Courier , monospace;
            background-color: var(--bg-app);
            color: var(--text-main);
            overflow: hidden;
        }
        .app-shell{
            display: grid;
            grid-template-columns: 420px 1fr;
            height: 100vh;
            padding: 20px;
            gap: 2opx;
        }
        .sidebar {
            background: var(--bg-sidebar);
            border: var(--border-width) solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            gap: 15px;
            box-shadow: var(--hard-shadow);
            position: relative;
        }

        .sidebar::after {
            content: "By Sadrita Neogi";
            position: absolute;
            bottom: 8px;
            left: 12px;
            font-size: 0.55rem;
            font-weight: bold;
            opacity: 0.7;
        }

        .brand-title {
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
            border-bottom: var(--border-width) solid var(--border-color);
            padding-bottom: 10px;
            letter-spacing: 2px;
            color: var(--text-main);
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border: var(--border-width) solid var(--border-color);
            background: var(--bg-sidebar);
            color: var(--text-main);
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: var(--hard-shadow-small);
            position: relative;
            font-size: 0.8rem;
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px var(--border-color);
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--border-color);
        }

        .btn-selected {
            background: var(--accent-primary) !important;
            color:#ffffff !important;
            border-color: var(--border-color);
        }

        .btn-primary {
            background: var(--accent-primary);
            color:#ffffff;
        }

        .btn-small {
            padding: 8px;
            font-size: 10.4px;
        }
        
        .card {
            border: var(--border-width) solid var(--border-color);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--bg-card);
        }

        .card-compact {
            border: var(--border-width) solid var(--border-color);
            padding: 12px;
            background: var(--bg-card);
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            background: var(--bg-sidebar);
            color: var(--bg-sidebar);
            padding: 3px 8px;
            align-self: flex-start;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .start-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed var(--border-color);
            padding: 6px 0;
            color: var(--text-main);
            font-size: 12.8px;
        }

        .start-row-mini {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 12px;
            border-bottom: 1px dotted var(--border-color);
        }

        input[type="range"] {
            appearance: none;
            width: 100%;
            height: 10px;
            background: var(--bg-app);
            border: 2px solid var(--border-color);
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 24px;
            background: var(--accent-primary);
            border: 2px solid var(--border-color);
            cursor:pointer;
        }

        .viewport-wrapper {
            background: var(--bg-viweport);
            border: var(--border-width) solid var(--border-color);
            box-shadow: var(--hard-shadow);
            position: relative;
            overflow: hidden;
        }

        .theme-toggle-container {
            font-size: 11.2px;
            font-weight: 900;
            border: 2px solid var(--bg-card);
            padding: 4px 8px;
            background: var(--bg-card);
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tabs-container {
            display: flex;
            gap: 5px;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 10px;
            overflow-x: auto;
        }

        .tab-button {
            padding: 8px 12px;
            font-size: 9.6px;
            font-weight: 900;
            border: none;
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
            text-transform: uppercase;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-button.active {
            border-bottom-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .tab-content {
            display: none;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .tab-content.active {
            display: block;
        }

        .present-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .present-btn {
            padding: 8px;
            font-size: 9.6px;
            border: 2px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .present-btn:hover {
            background: var(--accent-primary);
            color: white;
            transform: translate(-1px, -1px);
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            margin-right: 5px
        }

        .status-indicator.loading {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        .status-indicator.error {
            background: #ef4444;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-text {
            color: White;
            font-weight: bold;
            font-size: 19.2px;
            text-transform: uppercase;
            margin-top: 15px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        input[type="file"] {
            display: none;
        }

        .viewport-hud {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            font-size: 11.2px;
            font-family: monospace;
            border: 1px solid var(--accent-primary);
            max-width: 200px;
            display: none;
        }

        .viewport-hud.show {
            display: block;
        }

        .hud-item {
            padding: 3px 0;
            border-bottom: 1px dashed var(--accent-primary);
        }

        .keyboard-shortcuts {
            font-size: 10.4px;
            line-height: 1.6;
        }

        .shortcut-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom:1px dotted var(--border-color);
        }

        .key-badge {
            background: var(--accent-primary);
            color: white;
            padding: 2px 6px;
            font-weight: bold;
            border-radius: 3px;
            font-size: 9.6px;
        }

        .action-btn {
            padding: 10px;
            font-size: 10.4px;
            font-weight: 900;
            border: var(--border-width) solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            cursor: pointer;
            text-transform: uppercase;     
        }

        .action-btn:hover {
            transform: translate(-1px, -0.0625rem);
            box-shadow: 3px 3px opx var(--border-color);
        }
        
        .screenshot-flash {
            position: absolute;
            insert: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            transition: opacity 0.05s ease-in;
        }

        .screenshot-flash.active {
            opacity: 1;
            transition: opacity .05s ease-in;
        }

        .tost-conrainer {
            position: absolute;
            bottom: 20px;
            left:50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
        }

        .tost {
            background: var(--accent-primary);
            color: white;
            padding: 10px 20px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            border: 2px solid white;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .tost.show {
            opacity: 1;
            transform: translateY(0);
        }

        .rotation-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
        }

        .rotation-btn {
            padding: 8px 4px;
            font-size: 9.28px;
            border: 2px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
        }

        .rotation-btn:hover {
            background: var(--accent-primary);
            color: white;
            transform: translate(-1px, -1px);
        }

        .slide-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .slide-lable-row {
            display: flex;
            justify-content: space-between;
            font-size: 10.4px;
            font-weight: bold;
        }

        .explode-slider-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .annotion-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 120px;
            overflow-y: auto;
        }

        .annotation-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 6px;
            border: 1px solid var(--border-color);
            font-size: 9.92px;
            background: var(--bg-app);
        }

        .annotation-item button {
            background: #ef4444;
            color: white;
            border: none;
            padding: 2px 6px;
            cursor: pointer;
            font-size: 9.6px;
            font-weight: bold;
        }

        .camera-preset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
        }

        .cam-btn {
            padding: 8px 4px;

        }

        
    </style>
    </head>
</html>
