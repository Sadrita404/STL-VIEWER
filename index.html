<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title> Precision 3D | Model Analyzer - STL Viewer</title>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script
src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/STLLoader.js">
</script>   
    <script
src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js">
</script>         

    <style>
        :root {
          --bg-app: #e0e7ff;
          --bg-sidebar: #ffffff;
          --bg-viewport: #f8fafc;
          --bg-card: #1a1c2c;
          --text-main: #8b5cf6;
          --accent-primary: #1a1c2c; 
          --border-width: 3px;
          --hard-shadow: 6px 6px 0px #1a1c2c;
          --hard-shadow: 3px 3px 0px #1a1c2c;

        }
        [data-theme="dark"] {
            --bg-app: #0f111a;
            --bg-sidebar: #1a1c2c;
            --bg-viewport: #000000;
            --bg-card: #24283b;
            --text-main: #ffffff;
            --accent-primary: #a78bfa; 
            --border-color: #ffffff;
            --border-width: 6px 6px 0px #4f6e54;
            --hard-shadow-small: 3px 3px 0px #4f46e5;
            
        }
        * {
            box-sizing: border-box;
            transition: transform 0.1s, background-color 0.3s, color 0.3s,
                border-color 0.3s;
        }
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Courier New", Courier , monospace;
            background-color: var(--bg-app);
            color: var(--text-main);
            overflow: hidden;
        }
        .app-shell{
            display: grid;
            grid-template-columns: 420px 1fr;
            height: 100vh;
            padding: 20px;
            gap: 2opx;
        }
        .sidebar {
            background: var(--bg-sidebar);
            border: var(--border-width) solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            gap: 15px;
            box-shadow: var(--hard-shadow);
            position: relative;
        }

        .sidebar::after {
            content: "By Sadrita Neogi";
            position: absolute;
            bottom: 8px;
            left: 12px;
            font-size: 0.55rem;
            font-weight: bold;
            opacity: 0.7;
        }

        .brand-title {
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
            border-bottom: var(--border-width) solid var(--border-color);
            padding-bottom: 10px;
            letter-spacing: 2px;
            color: var(--text-main);
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border: var(--border-width) solid var(--border-color);
            background: var(--bg-sidebar);
            color: var(--text-main);
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: var(--hard-shadow-small);
            position: relative;
            font-size: 0.8rem;
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px var(--border-color);
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--border-color);
        }

        .btn-selected {
            background: var(--anccent-primary) !important;
            color:#ffffff !important;
            border-color: var(--border-color);
        }

        .btn-primary {
            background: var(--accent-primary);
            color:#ffffff;
        }

        .btn-small {
            padding: 8px;
            font-size: 10.4px;
        }
        
        .card {
            border: var(--border-width) solid var(--border-color);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--bg-card);
        }

        .card-compact {
            border: var(--border-width) solid var(--border-color);
            padding: 12px;
            background: var(--bg-card);
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            background: var(--bg-sidebar);
            color: var(--bg-sidebar);
            padding: 3px 8px;
            align-self: flex-start;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .start-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed var(--border-color);
            padding: 6px 0;
            color: var(--text-main);
            font-size: 12.8px;
        }

        .start-row-mini {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 12px;
            border-bottom: 1px dotted var(--border-color);
        }

        input[type="range"] {
            appearance: none;
            width: 100%;
            height: 10px;
            background: var(--bg-app);
            border: 2px solid var(--border-color);
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 24px;
            background: var(--accent-primary);
            border: 2px solid var(--border-color);
            cursor:pointer;
        }

        

    </style>
    </head>
</html>
