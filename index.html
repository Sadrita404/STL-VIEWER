<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title> Precision 3D | Model Analyzer - STL Viewer</title>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script
src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/STLLoader.js">
</script>   
    <script
src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js">
</script>         

    <style>
        :root {
          --bg-app: #e0e7ff;
          --bg-sidebar: #ffffff;
          --bg-viewport: #f8fafc;
          --bg-card: #1a1c2c;
          --text-main: #8b5cf6;
          --accent-primary: #1a1c2c; 
          --border-width: 3px;
          --hard-shadow: 6px 6px 0px #1a1c2c;
          --hard-shadow: 3px 3px 0px #1a1c2c;

        }
        [data-theme="dark"] {
            --bg-app: #0f111a;
            --bg-sidebar: #1a1c2c;
            --bg-viewport: #000000;
            --bg-card: #24283b;
            --text-main: #ffffff;
            --accent-primary: #a78bfa; 
            --border-color: #ffffff;
            --border-width: 6px 6px 0px #4f6e54;
            --hard-shadow-small: 3px 3px 0px #4f46e5;
            
        }
        * {
            box-sizing: border-box;
            transition: transform 0.1s, background-color 0.3s, color 0.3s,
                border-color 0.3s;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Courier New", Courier , monospace;
            background-color: var(--bg-app);
            color: var(--text-main);
            overflow: hidden;
        }

    </style>
    </head>
</html>
